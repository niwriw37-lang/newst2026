<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Shadow Panel</title>
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/565/565547.png">

<style>
body{
margin:0;
background:#0d0d0d;
font-family:sans-serif;
color:#ff0033;
text-align:center;
overflow:hidden;
}

/* โลโก้ */
#logo{
margin-top:120px;
font-size:40px;
letter-spacing:5px;
animation:glow 1.5s infinite alternate;
}
@keyframes glow{
from{ text-shadow:0 0 10px #ff0033; }
to{ text-shadow:0 0 30px #ff0033; }
}

/* รหัส */
#login{
display:none;
margin-top:40px;
}

input{
padding:10px;
background:black;
border:2px solid #ff0033;
color:#ff0033;
}

button{
padding:10px 20px;
background:#ff0033;
border:none;
color:black;
cursor:pointer;
}

/* เมนู */
#panel{
display:none;
margin-top:50px;
}

.card{
background:#1a1a1a;
margin:15px auto;
padding:15px;
width:250px;
border:1px solid #ff0033;
cursor:pointer;
transition:0.3s;
}

.card.active{
background:#ff0033;
color:black;
}

.card:hover{
transform:scale(1.05);
}

</style>
</head>
<body>

<div id="logo">SHADOW</div>

<div id="login">
<h3>Enter Access Code</h3>
<input type="password" id="code">
<button onclick="enter()">ENTER</button>
</div>

<div id="panel">
<div class="card">Stealth Mode</div>
<div class="card">Speed Boost</div>
<div class="card">Visual Assist</div>
<div class="card">Ultra Smooth</div>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
setTimeout(()=>{
document.getElementById("login").style.display="block";
},1500);

function enter(){
let code=document.getElementById("code").value;
if(code==="SP"){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
}else{
alert("Wrong Code");
}
}

document.querySelectorAll(".card").forEach(card=>{
card.addEventListener("click",()=>{
document.getElementById("sound").play();
card.classList.toggle("active");
});
});
</script>

</body>
</html>
