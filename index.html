<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUTO4444</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(180deg,#000,#1a0000);
    color:white;
    text-align:center;
}

h1{
    margin-top:40px;
    color:red;
    text-shadow:0 0 10px red;
}

input{
    width:80%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
}

button{
    width:80%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:red;
    color:white;
    font-weight:bold;
}

.hidden{
    display:none;
}

.status{
    margin-top:10px;
    color:#ff4444;
}
</style>
</head>
<body>

<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<div id="login">
    <h1>GUTO4444</h1>
    <input type="password" id="pass" placeholder="ใส่รหัสเข้าใช้งาน">
    <br>
    <button onclick="login()">เข้าสู่ระบบ</button>
    <div class="status" id="loginStatus"></div>
</div>

<div id="panel" class="hidden">
    <h1>BOOST PANEL</h1>

    <button onclick="activate('BOOST MODE')">BOOST MODE</button>
    <button onclick="activate('FPS 120')">FPS 120</button>
    <button onclick="activate('LAG FIX')">LAG FIX</button>
    <button onclick="activate('TOUCH DRAG')">TOUCH DRAG</button>

    <div class="status" id="boostStatus"></div>
</div>

<script>
const sound = document.getElementById("clickSound");

function playSound(){
    sound.currentTime = 0;
    sound.play();
}

function login(){
    playSound();
    let password = document.getElementById("pass").value;
    if(password === "GUTO444"){
        document.getElementById("login").classList.add("hidden");
        document.getElementById("panel").classList.remove("hidden");
    }else{
        document.getElementById("loginStatus").innerText = "ACCESS DENIED ❌";
    }
}

function activate(mode){
    playSound();
    document.getElementById("boostStatus").innerText = mode + " ACTIVATED 🔥";
}
</script>

</body>
  </html>
